name: Bug report
description: Report a problem with Codex Savings Tray
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Windows version, Codex version, and anything unusual about your setup.
